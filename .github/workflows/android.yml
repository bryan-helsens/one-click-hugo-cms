name: Build Android APK

# Builds the PokéInventory Scanner debug APK in the cloud and publishes it as a
# downloadable release asset, so it can be installed on a phone without a local
# Android Studio setup.

on:
  push:
    branches:
      - claude/pokemon-go-inventory-tool-hlz6wh
    paths:
      - "pokemon-android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pokemon-android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.6"

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pokeinventory-scanner-debug
          path: pokemon-android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish APK to a release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=app/build/outputs/apk/debug/app-debug.apk
          gh release delete android-latest --yes --cleanup-tag 2>/dev/null || true
          gh release create android-latest "$APK" \
            --title "PokéInventory Scanner — latest debug build" \
            --notes "Auto-built debug APK. On your phone: download \`app-debug.apk\`, then open it and allow installing from unknown sources." \
            --target "$GITHUB_SHA"
